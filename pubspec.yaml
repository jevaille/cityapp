name: cityapp
description: A City App for citizens to access city services and information
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # RSS Parsing
  xml: ^6.3.0

  # UI & Utilities
  cupertino_icons: ^1.0.6
  provider: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  
  # Networking
  http: ^1.1.0
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  
  # Database
  shared_preferences: ^2.2.2
  
  # Location & Maps
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.0
  
  # Image & Camera
  image_picker: ^1.0.5
  camera: ^0.10.5
  
  # Permissions
  permission_handler: ^11.0.1
  
  # UI Components
  toastification: ^3.0.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.0
  smooth_page_indicator: ^1.1.0
  
  # Utilities
  intl: ^0.20.0
  url_launcher: ^6.2.1
  package_info_plus: 7.0.0
  device_info_plus: ^9.1.0
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/news1.png
    - assets/images/news2.png
    - assets/images/news3.png
    - assets/icons/
    - assets/logos/
    - assets/fonts/
    - assets/animations/